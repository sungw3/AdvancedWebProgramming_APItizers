<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Room - Chatting with Emotion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #f9f9f9; margin: 0; padding: 0; }

        .container { 
            max-width: 600px; 
            margin-top: 50px; 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        .form-label { font-weight: bold; }

        .was-validated #roomSubtitle.form-control:valid {
            border-color: #dee2e6 !important;
            background-image: none !important;
            box-shadow: none !important;
        }

        .was-validated .form-check-input:valid {
            border-color: rgba(0, 0, 0, 0.25) !important;
        }

        .was-validated .form-check-input:valid:checked {
            border-color: #0d6efd !important;
            background-color: #0d6efd !important;
        }

        #roomSubtitle {
            height: 80px;
            resize: none;
        }

        #password-area { display: none; }
    </style>
</head>
<body>

    <div class="container shadow-sm">
        <h2 class="mb-4 text-center">Create New Room</h2>
        <hr>
        
        <form id="createRoomForm" class="needs-validation" novalidate>
            <div class="mb-3">
                <label for="roomTitle" class="form-label">Room Title <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="roomTitle" required>
                <div class="invalid-feedback"></div>
            </div>

            <div class="mb-3">
                <label for="roomSubtitle" class="form-label">Subtitle</label>
                <textarea class="form-control" id="roomSubtitle"></textarea>
            </div>

            <div class="mb-4">
                <label for="maxParticipants" class="form-label">Max Participants: <span id="rangeValue" class="text-primary">6</span></label>
                <input type="range" class="form-range" id="maxParticipants" min="2" max="10" value="6" step="1">
                <div class="d-flex justify-content-between h6 text-muted">
                    <span>2</span>
                    <span>10</span>
                </div>
            </div>

            <div class="form-check form-switch mb-3 ps-0 d-flex align-items-center">
                <label class="form-check-label fw-bold me-3" for="privateSwitch">Private</label>
                <input class="form-check-input ms-0" type="checkbox" id="privateSwitch" style="cursor: pointer;">
            </div>

            <div id="password-area" class="mb-4">
                <label for="roomPassword" class="form-label">Create Password</label>
                <input type="password" class="form-control" id="roomPassword">
                <div class="invalid-feedback"></div>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg">Create & Enter</button>
                <a href="index.html" class="btn btn-light">Cancel</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="api.js"></script>
    <script>

        const rangeInput = document.getElementById('maxParticipants');
        const rangeValue = document.getElementById('rangeValue');

        rangeInput.addEventListener('input', function() {
            rangeValue.innerText = this.value;
        });

        const privateSwitch = document.getElementById('privateSwitch');
        const passwordArea = document.getElementById('password-area');
        const roomPassword = document.getElementById('roomPassword');

        privateSwitch.addEventListener('change', function() {
            if (this.checked) {
                passwordArea.style.display = 'block';
                roomPassword.setAttribute('required', 'true');
            } else {
                passwordArea.style.display = 'none';
                roomPassword.removeAttribute('required');
                roomPassword.value = "";
            }
        });

        window.addEventListener('pageshow', function() {
            if (privateSwitch.checked) {
                passwordArea.style.display = 'block';
                roomPassword.setAttribute('required', 'true');
            } else {
                passwordArea.style.display = 'none';
                roomPassword.removeAttribute('required');
            }
            rangeValue.innerText = rangeInput.value;
        });

        const form = document.getElementById('createRoomForm');

        form.addEventListener('submit', async function(event) {
            event.preventDefault(); 

            if (!form.checkValidity()) {
                event.stopPropagation();
                form.classList.add('was-validated'); 
                return; 
            }

            const roomData = {
                title: document.getElementById('roomTitle').value,
                subtitle: document.getElementById('roomSubtitle').value,
                maxParticipants: document.getElementById('maxParticipants').value,
                isPrivate: document.getElementById('privateSwitch').checked,
                password: document.getElementById('privateSwitch').checked ? document.getElementById('roomPassword').value : null
            };

            try {
                const response = await fetch('https://server/api/rooms', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('accessToken')}`
                    },
                    body: JSON.stringify(roomData) 
                });

                if (response.ok) {
                    const result = await response.json();
                    alert('Room created! Moving to chat room.');
                    location.href = `chat.html?roomId=${result.roomId}`; 
                } else {
                    alert('Failed to create room. Please try again.');
                }

            } catch (error) {
                console.error('Server communication error:', error);
                // Test purpose when server is not available
                alert('[test] Server not available, moving to chat room.');
                location.href = 'chat.html';
            }
        });
    </script>

    <script src="nav-bar.js"></script>

</body>
</html>
