<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Chatting with Emotion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
    </style>
</head>
<body class="bg-light vh-100 d-flex align-items-center justify-content-center">

    <div class="card shadow-sm login-card">
        <div class="card-body">
            <h3 class="card-title text-center mb-4">Enter Chatting Room</h3>
            
            <form class="needs-validation" action="chat.html" novalidate>
                <div class="mb-3">
                    <label for="userId" class="form-label">ID</label>
                    <input type="text" class="form-control" id="userId" placeholder="Enter your ID" required>
                    <div class="invalid-feedback text-start"></div>
                </div>
              
                <div class="mb-3">
                    <label for="userPw" class="form-label">Password</label>
                    <input type="password" class="form-control" id="userPw" placeholder="Enter your password" required>
                    <div class="invalid-feedback text-start"></div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Enter</button>
                </div>
            </form>
            
            <div class="text-center mt-3">
                <span class="small text-muted">Create a new account</span>
                <a href="signup.html" class="text-decoration-none small">Sign Up</a>
            </div>
            
            <div class="text-center mt-4">
                <a href="index.html" class="text-decoration-none small text-muted">Go back to Home</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const loginForm = document.querySelector('.needs-validation');
        
        loginForm.addEventListener('submit', function(event) {
            
            // if login form is not valid, stop.
            if (!loginForm.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
                loginForm.classList.add('was-validated');
                return;
            }

            // if login form is valid, next step.
            event.preventDefault();
            
            // get the entered ID value. (for demo purposes, we are not validating the password or checking against a database)
            const enteredId = document.getElementById('userId').value;

            // memo the login state and user name in localStorage (for demo purposes, we are not implementing actual authentication)
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userName', enteredId);

            // redirect to the room list page after successful login
            window.location.href = 'room-list.html'; 
        });
    </script>

</html>
