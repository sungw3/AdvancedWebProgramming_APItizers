<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Chatting with Emotion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
    </style>
</head>

<body class="bg-light vh-100 d-flex align-items-center justify-content-center">

    <div class="card shadow-sm login-card">
        <div class="card-body">
            <h3 class="card-title text-center mb-4">Enter Chatting Room</h3>

            <form class="needs-validation" action="chat.html" novalidate>
                <div class="mb-3">
                    <label for="userId" class="form-label">ID</label>
                    <input type="text" class="form-control" id="userId" placeholder="Enter your ID" required>
                    <div class="invalid-feedback text-start"></div>
                </div>

                <div class="mb-3">
                    <label for="userPw" class="form-label">Password</label>
                    <input type="password" class="form-control" id="userPw" placeholder="Enter your password" required>
                    <div class="invalid-feedback text-start"></div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Enter</button>
                </div>
            </form>

            <div class="text-center mt-3">
                <span class="small text-muted">Create a new account</span>
                <a href="signup.html" class="text-decoration-none small">Sign Up</a>
            </div>

            <div class="text-center mt-4">
                <a href="index.html" class="text-decoration-none small text-muted">Go back to Home</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="api.js"></script>

    <script>
        const loginForm = document.querySelector('.needs-validation');

        loginForm.addEventListener('submit', async function (event) {
            event.preventDefault();

            if (!loginForm.checkValidity()) {
                event.stopPropagation();
                loginForm.classList.add('was-validated');
                return;
            }

            const enteredId = document.getElementById('userId').value;
            const enteredPw = document.getElementById('userPw').value;

            try {
                const data = await fetchAPI('/login', {
                    method: 'POST',
                    body: JSON.stringify({
                        id: enteredId,
                        password: enteredPw
                    })
                });
                
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('accessToken', data.token); // token from server
                localStorage.setItem('userName', data.userName); // userName from server

                alert(`${data.userName}, welcome!`);
                window.location.href = 'room-list.html'; // go room list page

            } catch (error) {
                console.error('login error:', error);
                alert('wrong ID or Password or server error.');
                document.getElementById('userPw').value = '';
            }
        });
    </script>

</body>

</html>
