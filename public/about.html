<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Getting Started - Chatting with Emotion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #f9f9f9; }
        nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 50px;
            background: #eee;
            height: 70px;
        }
        .container { max-width: 800px; margin-top: 40px; }
        .room-card { transition: transform 0.2s; cursor: pointer; }
        .room-card:hover { transform: translateY(-3px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .badge-count { font-size: 0.9rem; background-color: #6c757d !important; }
        
        #empty-state { display: none; padding: 100px 0; text-align: center; }
        .empty-icon { font-size: 4rem; color: #ccc; margin-bottom: 20px; }
    </style>
</head>
<body>

    <nav class="custom-nav">
        <div class="menu-left">
            <a href="index.html" class="text-decoration-none text-dark fw-bold me-3">Chatting with Emotion</a>
            <a href="room-list.html" class="text-decoration-none text-primary me-3">Browse Rooms</a>
            <a href="create-room.html" class="text-decoration-none me-3">Host Room</a>
            <a href="about.html" class="text-decoration-none fw-bold">Getting Started</a>
        </div>
        <div class="menu-right">
            <div id="login-section">
                <a href="login.html" class="btn btn-primary">Log In</a>
            </div>

            <div id="user-section" style="display: none;">
                <div class="dropdown">
                    <button class="btn btn-secondary dropdown-toggle btn-sm" type="button" id="userMenu" data-bs-toggle="dropdown" aria-expanded="false">
                        <span id="user-nickname">{examplename}, Welcome!</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userMenu">
                        <li><a class="dropdown-item text-danger" href="#" id="logout-btn">Log Out</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mb-5">
    
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const isLoggedIn = false;

        if (isLoggedIn) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('user-section').style.display = 'block';
        }
    </script>
</body>
</html>
