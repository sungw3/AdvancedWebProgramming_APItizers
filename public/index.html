<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatting with Emotion</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; }
        nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 50px;
            background: #eee;
            height: 70px;
        }
        .hero { 
            min-height: calc(100vh - 60px);
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            background: #f9f9f9; 
            text-align: center;
        }
        .btn-main { 
            padding: 10px 20px; 
            text-decoration: none; 
            background: #28a745; 
            color: white; 
            border-radius: 5px; 
            display: inline-block;
        }
    </style>
</head>
<body>
    <nav>
        <div class="menu-left">
            <a href="index.html" class="text-decoration-none text-dark fw-bold me-3">Chatting with Emotion</a>
            <a href="room-list.html" class="text-decoration-none me-3">Browse Room</a>
            <a href="create-room.html" class="text-decoration-none me-3">Host Room</a>
            <a href="about.html" class="text-decoration-none">Getting Started</a>
        </div>

        <div class="menu-right">
            <div id="login-section">
                <a href="login.html" class="btn btn-primary">Log In</a>
            </div>

            <div id="user-section" style="display: none;">
                <div class="dropdown">
                    <button class="btn btn-secondary dropdown-toggle btn-sm" type="button" id="userMenu" data-bs-toggle="dropdown" aria-expanded="false">
                        <span id="user-nickname">{examplename}, Welcome!</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userMenu">
                        <li><a class="dropdown-item text-danger" href="#" id="logout-btn">Log Out</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>  

    <section class="hero">
        <h1>(Carousel images here)</h1>
        <p>Analyze your chat emotions with AI</p>
        <br>
        <a href="login.html" class="btn-main">Let's begin</a>
    </section>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const isLoggedIn = false;  // for testing.

        if (isLoggedIn) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('user-section').style.display = 'block';
        }
    </script>

</body>
</html>
