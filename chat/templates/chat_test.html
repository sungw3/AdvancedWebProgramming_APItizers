<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>채팅 테스트</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        #messages { height: 500px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; background: #f9f9f9; }
        .message { margin: 10px 0; padding: 8px; border-radius: 8px; }
    </style>
</head>
<body>
    <h2>실시간 채팅 테스트 (Room: general)</h2>
    <input id="username" placeholder="사용자명" value="testuser1">
    <input id="message" placeholder="메시지 입력" style="width:300px">
    <button onclick="sendMessage()">전송</button>

    <div id="messages"></div>

    <script>
        const roomName = "general";
        const ws = new WebSocket(`ws://127.0.0.1:8000/ws/chat/${roomName}/`);

        ws.onopen = () => {
            console.log("✅ WebSocket 연결 성공!");
            addMessage("시스템", "연결되었습니다.");
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            addMessage(data.username, data.message);
        };

        function addMessage(username, message) {
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `<strong>${username}:</strong> ${message}`;
            document.getElementById('messages').appendChild(div);
            div.scrollIntoView();
        }

        function sendMessage() {
            const messageInput = document.getElementById('message');
            const username = document.getElementById('username').value;

            if (messageInput.value) {
                ws.send(JSON.stringify({
                    message: messageInput.value,
                    username: username
                }));
                messageInput.value = '';
            }
        }
    </script>
</body>
</html>
